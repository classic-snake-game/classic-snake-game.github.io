<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon Boss Snake</title>
    <style>
        body { background: #1e0000; color: #fff; text-align: center; margin: 0; font-family: Impact, sans-serif; overflow: hidden; }
        header { background: #4a0000; padding: 10px; border-bottom: 2px solid #ff3300; }
        h2 { margin: 0; color: #ff9900; letter-spacing: 2px; }
        .score-board { display: flex; justify-content: center; gap: 20px; margin: 10px 0; font-size: 18px; color: #ffeb3b; font-family: Arial;}
        .game-container { position: relative; display: flex; flex-direction: column; align-items: center; }
        canvas { background: #330000; border: 4px solid #ff3300; border-radius: 5px; box-shadow: inset 0 0 20px #000; }
        
        .overlay { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 400px; max-width: 95vw; height: 400px; background: rgba(30, 0, 0, 0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 5px; z-index: 10; border: 2px solid #ff3300; font-family: Arial;}
        .overlay h3 { font-size: 32px; color: #ff3300; margin-bottom: 20px; }
        .action-btn { background: #ff3300; color: white; border: none; padding: 12px 30px; font-size: 20px; font-weight: bold; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 51, 0, 0.5); }
        .action-btn:active { transform: scale(0.95); }

        .controls { display: grid; grid-template-columns: 60px 60px 60px; justify-content: center; gap: 5px; margin-top: 15px; }
        .ctrl-btn { background: #ff3300; color: white; border: none; border-radius: 8px; font-size: 20px; padding: 12px; touch-action: manipulation; }
    </style>
</head>
<body>
    <header><h2>🐉 Dragon Boss Fight</h2></header>
    <div class="score-board">
        <div id="levelDisplay" style="color: #ff3300;">Goal: 10 Hits</div>
        <div id="scoreDisplay">Hits: 0/10</div>
    </div>
    
    <div class="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <div id="startScreen" class="overlay">
            <h3>Defeat The Dragon</h3>
            <button class="action-btn" onclick="startGame()">▶️ Battle</button>
        </div>

        <div id="gameOverScreen" class="overlay" style="display: none;">
            <h3>Burned to Ashes 🔥</h3>
            <button class="action-btn" onclick="startGame()">🔄 Retry</button>
        </div>
        
        <div id="winScreen" class="overlay" style="display: none; border-color: #f1c40f;">
            <h3 style="color: #f1c40f;">🏆 VICTORY!</h3>
            <p style="font-size: 18px; margin-bottom: 20px;">You defeated the Dragon!</p>
            <button class="action-btn" style="background: #f1c40f; color: #000;" onclick="startGame()">🔄 Play Again</button>
        </div>
    </div>

    <div class="controls">
        <button id="btnLeft" class="ctrl-btn" style="grid-column: 1; grid-row: 2;">⬅️</button>
        <button id="btnUp" class="ctrl-btn" style="grid-column: 2; grid-row: 1;">⬆️</button>
        <button id="btnDown" class="ctrl-btn" style="grid-column: 2; grid-row: 2;">⬇️</button>
        <button id="btnRight" class="ctrl-btn" style="grid-column: 3; grid-row: 2;">➡️</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas"); const ctx = canvas.getContext("2d");
        
        const AudioContext = window.AudioContext || window.webkitAudioContext; let audioCtx;
        function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
        function playSound(type) {
            if (!audioCtx) return; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'eat') { osc.type = 'square'; osc.frequency.setValueAtTime(400, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1); gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); osc.start(); osc.stop(audioCtx.currentTime + 0.1); }
            else if (type === 'die') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.8); gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8); osc.start(); osc.stop(audioCtx.currentTime + 0.8); }
            else if (type === 'win') { osc.type = 'sine'; osc.frequency.setValueAtTime(500, audioCtx.currentTime); osc.frequency.setValueAtTime(1000, audioCtx.currentTime + 0.2); osc.frequency.setValueAtTime(1500, audioCtx.currentTime + 0.4); gain.gain.setValueAtTime(0.4, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6); osc.start(); osc.stop(audioCtx.currentTime + 0.6); }
        }

        let box = 20, score = 0, speed = 150, d = "RIGHT";
        let snake = []; let food = {}; let boss = {}; let gameLoop; let isGameRunning = false;

        function randomPos() { return { x: Math.floor(Math.random()*19+1)*box, y: Math.floor(Math.random()*19+1)*box }; }

        document.addEventListener("keydown", e => {
            if(!isGameRunning) return;
            if(e.keyCode == 37 && d != "RIGHT") d = "LEFT"; else if(e.keyCode == 38 && d != "DOWN") d = "UP";
            else if(e.keyCode == 39 && d != "LEFT") d = "RIGHT"; else if(e.keyCode == 40 && d != "UP") d = "DOWN";
        });
        const bindBtn = (id, dir, opp) => { document.getElementById(id).addEventListener("touchstart", (e) => { e.preventDefault(); if(!isGameRunning) return; if(d != opp) d = dir; }); };
        bindBtn("btnUp", "UP", "DOWN"); bindBtn("btnDown", "DOWN", "UP"); bindBtn("btnLeft", "LEFT", "RIGHT"); bindBtn("btnRight", "RIGHT", "LEFT");

        function drawBug(x, y) {
            const cx = x + box/2, cy = y + box/2;
            ctx.fillStyle = "#00ffcc"; ctx.beginPath(); ctx.ellipse(cx, cy+2, 6, 8, 0, 0, Math.PI*2); ctx.fill(); 
            ctx.fillStyle = "#2f3542"; ctx.beginPath(); ctx.arc(cx, cy-5, 4, 0, Math.PI*2); ctx.fill();
        }

        function drawSnakePart(part, index) {
            const isHead = index === 0; const cx = part.x + box/2, cy = part.y + box/2;
            ctx.fillStyle = isHead ? "#f39c12" : "#f1c40f"; 
            ctx.beginPath(); ctx.arc(cx, cy, box/2.2, 0, Math.PI*2); ctx.fill(); 
            if(isHead) {
                ctx.fillStyle = "white"; let e1x, e1y, e2x, e2y, off=4;
                if(d==="RIGHT"){e1x=cx+off; e1y=cy-off; e2x=cx+off; e2y=cy+off;} else if(d==="LEFT"){e1x=cx-off; e1y=cy-off; e2x=cx-off; e2y=cy+off;}
                else if(d==="UP"){e1x=cx-off; e1y=cy-off; e2x=cx+off; e2y=cy-off;} else if(d==="DOWN"){e1x=cx-off; e1y=cy+off; e2x=cx+off; e2y=cy+off;}
                ctx.beginPath(); ctx.arc(e1x, e1y, 3, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(e2x, e2y, 3, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "black";
                ctx.beginPath(); ctx.arc(e1x+(d==="RIGHT"?1:d==="LEFT"?-1:0), e1y+(d==="DOWN"?1:d==="UP"?-1:0), 1.5, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(e2x+(d==="RIGHT"?1:d==="LEFT"?-1:0), e2y+(d==="DOWN"?1:d==="UP"?-1:0), 1.5, 0, Math.PI*2); ctx.fill();
            }
        }

        function drawBoss() {
            ctx.fillStyle = "#c0392b"; ctx.shadowBlur = 15; ctx.shadowColor = "#e74c3c";
            ctx.beginPath(); ctx.arc(boss.x + boss.size/2, boss.y + boss.size/2, boss.size/2, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = "yellow";
            ctx.beginPath(); ctx.moveTo(boss.x+5, boss.y+5); ctx.lineTo(boss.x+12, boss.y+10); ctx.lineTo(boss.x+5, boss.y+15); ctx.fill();
            ctx.beginPath(); ctx.moveTo(boss.x+25, boss.y+5); ctx.lineTo(boss.x+18, boss.y+10); ctx.lineTo(boss.x+25, boss.y+15); ctx.fill();
        }

        let frameCount = 0;
        function draw() {
            if(!isGameRunning) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawBug(food.x, food.y); drawBoss();
            for (let i = 0; i < snake.length; i++) drawSnakePart(snake[i], i);

            // Boss Movement Logic (Gets faster as score increases)
            frameCount++;
            let bossSpeed = Math.max(1, 4 - Math.floor(score/3)); // Boss gets faster
            if(frameCount % bossSpeed === 0) {
                boss.x += boss.dirX * 10; boss.y += boss.dirY * 10;
                if(boss.x <= 0 || boss.x >= canvas.width - boss.size) boss.dirX *= -1;
                if(boss.y <= 0 || boss.y >= canvas.height - boss.size) boss.dirY *= -1;
            }

            let snakeX = snake[0].x, snakeY = snake[0].y;
            if (d == "LEFT") snakeX -= box; if (d == "UP") snakeY -= box;
            if (d == "RIGHT") snakeX += box; if (d == "DOWN") snakeY += box;

            // Boss Collision
            if(snakeX > boss.x - box && snakeX < boss.x + boss.size && snakeY > boss.y - box && snakeY < boss.y + boss.size) {
                endGame(false); return;
            }

            if (snakeX == food.x && snakeY == food.y) {
                score++; playSound('eat'); 
                document.getElementById("scoreDisplay").innerText = `Hits: ${score}/10`;
                if(score >= 10) { endGame(true); return; }
                food = randomPos();
            } else snake.pop();

            let newHead = { x: snakeX, y: snakeY };
            if(snakeX<0 || snakeY<0 || snakeX>=canvas.width || snakeY>=canvas.height) { endGame(false); return;}
            for(let i=0; i<snake.length; i++){ if(snakeX == snake[i].x && snakeY == snake[i].y) { endGame(false); return;}}
            
            snake.unshift(newHead);
            gameLoop = setTimeout(draw, speed);
        }

        function startGame() {
            initAudio(); 
            document.getElementById("startScreen").style.display = "none"; document.getElementById("gameOverScreen").style.display = "none"; document.getElementById("winScreen").style.display = "none";
            snake = [{ x: 5 * box, y: 10 * box }]; score = 0; speed = 150; d = "RIGHT"; isGameRunning = true; 
            food = { x: 15*box, y: 10*box }; boss = { x: 10*box, y: 5*box, dirX: 1, dirY: 1, size: 30 };
            document.getElementById("scoreDisplay").innerText = `Hits: 0/10`;
            clearTimeout(gameLoop); draw();
        }

        function endGame(isWin) {
            isGameRunning = false; clearTimeout(gameLoop);
            if(isWin) {
                playSound('win'); document.getElementById("winScreen").style.display = "flex";
            } else {
                playSound('die'); document.getElementById("gameOverScreen").style.display = "flex";
            }
        }
    </script>
</body>
</html>

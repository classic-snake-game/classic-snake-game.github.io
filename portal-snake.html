<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal Snake</title>
    <style>
        body { background: #000; color: #fff; text-align: center; margin: 0; font-family: sans-serif; overflow: hidden; }
        header { background: #4a0e4e; padding: 10px; border-bottom: 2px solid #b100cd; }
        canvas { background: radial-gradient(circle, #1a1a2e, #000); border: 2px solid #b100cd; margin-top: 10px; box-shadow: 0 0 20px #b100cd; }
        .controls { display: grid; grid-template-columns: 60px 60px 60px; justify-content: center; gap: 5px; margin-top: 10px; }
        button { background: #b100cd; color: white; border: none; border-radius: 10px; font-size: 24px; padding: 10px; touch-action: manipulation; }
        #scoreBoard { font-size: 20px; color: #00ffcc; margin: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <header><h2>🌌 Portal Snake</h2><div id="scoreBoard">Score: 0</div></header>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="controls">
        <button id="btnLeft" style="grid-column: 1; grid-row: 2;">⬅️</button>
        <button id="btnUp" style="grid-column: 2; grid-row: 1;">⬆️</button>
        <button id="btnDown" style="grid-column: 2; grid-row: 2;">⬇️</button>
        <button id="btnRight" style="grid-column: 3; grid-row: 2;">➡️</button>
    </div>
    <script>
        const canvas = document.getElementById("gameCanvas"); const ctx = canvas.getContext("2d");
        let box = 20, score = 0, d = "RIGHT";
        let snake = [{ x: 9 * box, y: 10 * box }];
        let food = { x: Math.floor(Math.random()*19+1)*box, y: Math.floor(Math.random()*19+1)*box };

        document.addEventListener("keydown", e => {
            if(e.keyCode == 37 && d != "RIGHT") d = "LEFT"; else if(e.keyCode == 38 && d != "DOWN") d = "UP";
            else if(e.keyCode == 39 && d != "LEFT") d = "RIGHT"; else if(e.keyCode == 40 && d != "UP") d = "DOWN";
        });
        const bindBtn = (id, dir, opp) => { document.getElementById(id).addEventListener("touchstart", (e) => { e.preventDefault(); if(d != opp) d = dir; }); };
        bindBtn("btnUp", "UP", "DOWN"); bindBtn("btnDown", "DOWN", "UP"); bindBtn("btnLeft", "LEFT", "RIGHT"); bindBtn("btnRight", "RIGHT", "LEFT");

        function drawBug(x, y) {
            const cx = x + box/2, cy = y + box/2;
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.beginPath();
            ctx.moveTo(cx-5, cy-6); ctx.lineTo(cx-12, cy-10); ctx.moveTo(cx-6, cy); ctx.lineTo(cx-14, cy); ctx.moveTo(cx-5, cy+6); ctx.lineTo(cx-12, cy+10);
            ctx.moveTo(cx+5, cy-6); ctx.lineTo(cx+12, cy-10); ctx.moveTo(cx+6, cy); ctx.lineTo(cx+14, cy); ctx.moveTo(cx+5, cy+6); ctx.lineTo(cx+12, cy+10); ctx.stroke();
            ctx.fillStyle = "#00ffcc"; ctx.beginPath(); ctx.ellipse(cx, cy+2, 6, 8, 0, 0, Math.PI*2); ctx.fill(); // Cyan Bug
            ctx.fillStyle = "#2f3542"; ctx.beginPath(); ctx.arc(cx, cy-5, 4, 0, Math.PI*2); ctx.fill();
        }

        function drawSnakePart(part, index) {
            const isHead = index === 0; const cx = part.x + box/2, cy = part.y + box/2;
            ctx.shadowBlur = isHead ? 10 : 0; ctx.shadowColor = "#b100cd";
            ctx.fillStyle = isHead ? "#8a2be2" : (index % 2 === 0 ? "#9932cc" : "#ba55d3"); // Purple Theme
            ctx.beginPath(); ctx.arc(cx, cy, box/2.2, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
            if(isHead) {
                ctx.fillStyle = "white"; let e1x, e1y, e2x, e2y, off=4;
                if(d==="RIGHT"){e1x=cx+off; e1y=cy-off; e2x=cx+off; e2y=cy+off;} else if(d==="LEFT"){e1x=cx-off; e1y=cy-off; e2x=cx-off; e2y=cy+off;}
                else if(d==="UP"){e1x=cx-off; e1y=cy-off; e2x=cx+off; e2y=cy-off;} else if(d==="DOWN"){e1x=cx-off; e1y=cy+off; e2x=cx+off; e2y=cy+off;}
                ctx.beginPath(); ctx.arc(e1x, e1y, 3, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(e2x, e2y, 3, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "black";
                ctx.beginPath(); ctx.arc(e1x+(d==="RIGHT"?1:d==="LEFT"?-1:0), e1y+(d==="DOWN"?1:d==="UP"?-1:0), 1.5, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(e2x+(d==="RIGHT"?1:d==="LEFT"?-1:0), e2y+(d==="DOWN"?1:d==="UP"?-1:0), 1.5, 0, Math.PI*2); ctx.fill();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBug(food.x, food.y);
            for (let i = 0; i < snake.length; i++) drawSnakePart(snake[i], i);

            let snakeX = snake[0].x, snakeY = snake[0].y;
            if (d == "LEFT") snakeX -= box; if (d == "UP") snakeY -= box;
            if (d == "RIGHT") snakeX += box; if (d == "DOWN") snakeY += box;

            if(snakeX >= canvas.width) snakeX = 0; else if(snakeX < 0) snakeX = canvas.width - box;
            if(snakeY >= canvas.height) snakeY = 0; else if(snakeY < 0) snakeY = canvas.height - box;

            if (snakeX == food.x && snakeY == food.y) {
                score++; document.getElementById("scoreBoard").innerText = "Score: " + score;
                food = { x: Math.floor(Math.random()*19+1)*box, y: Math.floor(Math.random()*19+1)*box };
            } else snake.pop();

            let newHead = { x: snakeX, y: snakeY };
            for(let i=0; i<snake.length; i++){ if(snakeX == snake[i].x && snakeY == snake[i].y) { alert("Crashed into yourself! Score: "+score); location.reload(); }}
            snake.unshift(newHead);
        }
        setInterval(draw, 120);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minefield Snake</title>
    <style>
        body { background: #2c3e50; color: #fff; text-align: center; margin: 0; font-family: 'Arial', sans-serif; overflow: hidden; }
        header { background: #e74c3c; padding: 10px; border-bottom: 4px solid #c0392b; }
        h2 { margin: 0; text-transform: uppercase; text-shadow: 2px 2px 0 #000; }
        .score-board { display: flex; justify-content: center; gap: 20px; margin: 10px 0; font-size: 18px; font-weight: bold; color: #f1c40f; }
        .game-container { position: relative; display: flex; flex-direction: column; align-items: center; }
        canvas { background: #34495e; border: 4px solid #2ecc71; border-radius: 5px; box-shadow: 0 0 15px rgba(0,0,0,0.5);}
        
        .overlay { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 400px; max-width: 95vw; height: 400px; background: rgba(44, 62, 80, 0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 5px; z-index: 10; border: 2px solid #e74c3c;}
        .overlay h3 { font-size: 32px; color: #e74c3c; margin-bottom: 20px; text-shadow: 0 0 10px #000; }
        .action-btn { background: #e74c3c; color: #fff; border: none; padding: 12px 30px; font-size: 20px; font-weight: bold; border-radius: 5px; cursor: pointer; box-shadow: 0 4px 15px rgba(231, 76, 60, 0.5); }
        .action-btn:active { transform: scale(0.95); }

        .controls { display: grid; grid-template-columns: 60px 60px 60px; justify-content: center; gap: 5px; margin-top: 15px; }
        .ctrl-btn { background: #e74c3c; color: white; border: none; border-radius: 8px; font-size: 20px; padding: 12px; font-weight: bold; touch-action: manipulation;}
    </style>
</head>
<body>
    <header><h2>💣 Minefield</h2></header>
    <div class="score-board">
        <div id="levelDisplay" style="color: #2ecc71;">Level: 1</div>
        <div id="scoreDisplay">Score: 0 | Mines: 0</div>
    </div>
    
    <div class="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="startScreen" class="overlay">
            <h3>Enter Warzone</h3>
            <button class="action-btn" onclick="startGame()">▶️ Start Mission</button>
        </div>
        <div id="gameOverScreen" class="overlay" style="display: none;">
            <h3>BOOM! 💥</h3>
            <p id="finalScoreText" style="font-size: 20px; margin-bottom: 20px;">Score: 0</p>
            <button class="action-btn" onclick="startGame()">🔄 Restart Mission</button>
        </div>
    </div>

    <div class="controls">
        <button id="btnLeft" class="ctrl-btn" style="grid-column: 1; grid-row: 2;">⬅️</button>
        <button id="btnUp" class="ctrl-btn" style="grid-column: 2; grid-row: 1;">⬆️</button>
        <button id="btnDown" class="ctrl-btn" style="grid-column: 2; grid-row: 2;">⬇️</button>
        <button id="btnRight" class="ctrl-btn" style="grid-column: 3; grid-row: 2;">➡️</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas"); const ctx = canvas.getContext("2d");
        
        const AudioContext = window.AudioContext || window.webkitAudioContext; let audioCtx;
        function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
        function playSound(type) {
            if (!audioCtx) return; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'eat') { osc.type = 'sine'; osc.frequency.setValueAtTime(700, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(1400, audioCtx.currentTime + 0.1); gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); osc.start(); osc.stop(audioCtx.currentTime + 0.1); }
            else if (type === 'die') { osc.type = 'square'; osc.frequency.setValueAtTime(100, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.5); gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5); osc.start(); osc.stop(audioCtx.currentTime + 0.5); }
            else if (type === 'levelUp') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, audioCtx.currentTime); osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.2); gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4); osc.start(); osc.stop(audioCtx.currentTime + 0.4); }
        }

        let box = 20, score = 0, level = 1, speed = 170, d = "RIGHT";
        let snake = []; let food = {}; let mines = []; let gameLoop; let isGameRunning = false;

        function getFreePos() {
            let f, valid = false;
            while(!valid) {
                f = { x: Math.floor(Math.random()*19+1)*box, y: Math.floor(Math.random()*19+1)*box };
                valid = true;
                for(let m of mines) if(f.x == m.x && f.y == m.y) valid = false;
                for(let s of snake) if(f.x == s.x && f.y == s.y) valid = false;
            } return f;
        }

        document.addEventListener("keydown", e => {
            if(!isGameRunning) return;
            if(e.keyCode == 37 && d != "RIGHT") d = "LEFT"; else if(e.keyCode == 38 && d != "DOWN") d = "UP";
            else if(e.keyCode == 39 && d != "LEFT") d = "RIGHT"; else if(e.keyCode == 40 && d != "UP") d = "DOWN";
        });
        const bindBtn = (id, dir, opp) => { document.getElementById(id).addEventListener("touchstart", (e) => { e.preventDefault(); if(!isGameRunning) return; if(d != opp) d = dir; }); };
        bindBtn("btnUp", "UP", "DOWN"); bindBtn("btnDown", "DOWN", "UP"); bindBtn("btnLeft", "LEFT", "RIGHT"); bindBtn("btnRight", "RIGHT", "LEFT");

        function drawBug(x, y) {
            const cx = x + box/2, cy = y + box/2;
            ctx.fillStyle = "#f1c40f"; ctx.beginPath(); ctx.ellipse(cx, cy+2, 6, 8, 0, 0, Math.PI*2); ctx.fill(); 
            ctx.fillStyle = "#2f3542"; ctx.beginPath(); ctx.arc(cx, cy-5, 4, 0, Math.PI*2); ctx.fill();
        }

        function drawMine(x, y) {
            const cx = x + box/2, cy = y + box/2;
            ctx.fillStyle = "#111"; ctx.beginPath(); ctx.arc(cx, cy, 7, 0, Math.PI*2); ctx.fill(); 
            ctx.fillStyle = (Date.now() % 1000 < 500) ? "red" : "#550000"; // Blinking light
            ctx.beginPath(); ctx.arc(cx, cy, 2, 0, Math.PI*2); ctx.fill(); 
            ctx.strokeStyle = "#111"; ctx.lineWidth = 2; 
            ctx.beginPath(); ctx.moveTo(cx-10, cy); ctx.lineTo(cx+10, cy); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx, cy-10); ctx.lineTo(cx, cy+10); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx-7, cy-7); ctx.lineTo(cx+7, cy+7); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx-7, cy+7); ctx.lineTo(cx+7, cy-7); ctx.stroke();
        }

        function drawSnakePart(part, index) {
            const isHead = index === 0; const cx = part.x + box/2, cy = part.y + box/2;
            ctx.fillStyle = isHead ? "#27ae60" : "#2ecc71"; 
            ctx.beginPath(); ctx.arc(cx, cy, box/2.2, 0, Math.PI*2); ctx.fill(); 
            if(isHead) {
                ctx.fillStyle = "white"; let e1x, e1y, e2x, e2y, off=4;
                if(d==="RIGHT"){e1x=cx+off; e1y=cy-off; e2x=cx+off; e2y=cy+off;} else if(d==="LEFT"){e1x=cx-off; e1y=cy-off; e2x=cx-off; e2y=cy+off;}
                else if(d==="UP"){e1x=cx-off; e1y=cy-off; e2x=cx+off; e2y=cy-off;} else if(d==="DOWN"){e1x=cx-off; e1y=cy+off; e2x=cx+off; e2y=cy+off;}
                ctx.beginPath(); ctx.arc(e1x, e1y, 3, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(e2x, e2y, 3, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "black";
                ctx.beginPath(); ctx.arc(e1x+(d==="RIGHT"?1:d==="LEFT"?-1:0), e1y+(d==="DOWN"?1:d==="UP"?-1:0), 1.5, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(e2x+(d==="RIGHT"?1:d==="LEFT"?-1:0), e2y+(d==="DOWN"?1:d==="UP"?-1:0), 1.5, 0, Math.PI*2); ctx.fill();
            }
        }

        function draw() {
            if(!isGameRunning) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBug(food.x, food.y);
            for(let m of mines) drawMine(m.x, m.y);
            for (let i = 0; i < snake.length; i++) drawSnakePart(snake[i], i);

            let snakeX = snake[0].x, snakeY = snake[0].y;
            if (d == "LEFT") snakeX -= box; if (d == "UP") snakeY -= box;
            if (d == "RIGHT") snakeX += box; if (d == "DOWN") snakeY += box;

            if (snakeX == food.x && snakeY == food.y) {
                score++; playSound('eat'); food = getFreePos();
                mines.push(getFreePos()); // Add 1 mine
                
                // Minefield Level Up Logic
                if(score % 5 === 0) {
                    level++; playSound('levelUp');
                    if(speed > 70) speed -= 10;
                    mines.push(getFreePos()); // Add bonus mine
                    document.getElementById("levelDisplay").innerText = "Level: " + level;
                }
                document.getElementById("scoreDisplay").innerText = `Score: ${score} | Mines: ${mines.length}`;
            } else snake.pop();

            let newHead = { x: snakeX, y: snakeY };
            for(let m of mines) { if(snakeX == m.x && snakeY == m.y) { endGame(); return; } }
            if(snakeX<0 || snakeY<0 || snakeX>=canvas.width || snakeY>=canvas.height) { endGame(); return; }
            for(let i=0; i<snake.length; i++){ if(snakeX == snake[i].x && snakeY == snake[i].y) { endGame(); return; }}
            
            snake.unshift(newHead);
            gameLoop = setTimeout(draw, speed);
        }

        function startGame() {
            initAudio(); document.getElementById("startScreen").style.display = "none"; document.getElementById("gameOverScreen").style.display = "none";
            snake = [{ x: 5 * box, y: 10 * box }]; score = 0; level = 1; speed = 170; d = "RIGHT"; isGameRunning = true; 
            mines = []; food = getFreePos();
            document.getElementById("scoreDisplay").innerText = `Score: 0 | Mines: 0`; document.getElementById("levelDisplay").innerText = "Level: 1";
            clearTimeout(gameLoop); draw();
        }

        function endGame() {
            isGameRunning = false; clearTimeout(gameLoop); playSound('die');
            document.getElementById("finalScoreText").innerText = `Score: ${score}\nDied at Level: ${level}`;
            document.getElementById("gameOverScreen").style.display = "flex";
        }
    </script>
</body>
</html>

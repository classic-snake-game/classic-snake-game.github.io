<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Color Changer Snake</title>
    <style>
        body { background: #222f3e; color: #fff; text-align: center; margin: 0; font-family: Arial, sans-serif; overflow: hidden; }
        header { background: #10ac84; padding: 10px; border-bottom: 3px solid #01a3a4; box-shadow: 0 2px 10px rgba(16, 172, 132, 0.5);}
        h2 { margin: 0; text-transform: uppercase; letter-spacing: 2px;}
        canvas { background: #000; border: 4px solid #c8d6e5; margin-top: 15px; border-radius: 10px; box-shadow: 0 0 20px rgba(200,214,229,0.2);}
        .controls { display: grid; grid-template-columns: 60px 60px 60px; justify-content: center; gap: 8px; margin-top: 10px; }
        button { background: #c8d6e5; color: #222f3e; border: none; border-radius: 5px; font-size: 20px; font-weight: bold; padding: 12px; touch-action: manipulation; }
        #scoreBoard { font-size: 18px; color: #fff; margin-top: 5px; }
    </style>
</head>
<body>
    <header><h2>🌈 Color Changer</h2><div id="scoreBoard">Score: 0</div></header>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="controls">
        <button id="btnLeft" style="grid-column: 1; grid-row: 2;">⬅️</button>
        <button id="btnUp" style="grid-column: 2; grid-row: 1;">⬆️</button>
        <button id="btnDown" style="grid-column: 2; grid-row: 2;">⬇️</button>
        <button id="btnRight" style="grid-column: 3; grid-row: 2;">➡️</button>
    </div>
    <script>
        const canvas = document.getElementById("gameCanvas"); const ctx = canvas.getContext("2d");
        let box = 20, score = 0, d = "RIGHT";
        let snake = [{ x: 9 * box, y: 10 * box }];
        
        let colors = ["#ff9f43", "#ee5253", "#0abde3", "#10ac84", "#f368e0", "#ffdd59"];
        let foodColor = colors[Math.floor(Math.random() * colors.length)];
        let snakeColor = "#ffffff"; // Initial color is white
        
        let food = { x: Math.floor(Math.random()*19+1)*box, y: Math.floor(Math.random()*19+1)*box };

        document.addEventListener("keydown", e => {
            if(e.keyCode == 37 && d != "RIGHT") d = "LEFT"; else if(e.keyCode == 38 && d != "DOWN") d = "UP";
            else if(e.keyCode == 39 && d != "LEFT") d = "RIGHT"; else if(e.keyCode == 40 && d != "UP") d = "DOWN";
        });
        const bindBtn = (id, dir, opp) => { document.getElementById(id).addEventListener("touchstart", (e) => { e.preventDefault(); if(d != opp) d = dir; }); };
        bindBtn("btnUp", "UP", "DOWN"); bindBtn("btnDown", "DOWN", "UP"); bindBtn("btnLeft", "LEFT", "RIGHT"); bindBtn("btnRight", "RIGHT", "LEFT");

        function drawBug(x, y, color) {
            const cx = x + box/2, cy = y + box/2;
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.beginPath();
            ctx.moveTo(cx-5, cy-6); ctx.lineTo(cx-12, cy-10); ctx.moveTo(cx-6, cy); ctx.lineTo(cx-14, cy); ctx.moveTo(cx-5, cy+6); ctx.lineTo(cx-12, cy+10);
            ctx.moveTo(cx+5, cy-6); ctx.lineTo(cx+12, cy-10); ctx.moveTo(cx+6, cy); ctx.lineTo(cx+14, cy); ctx.moveTo(cx+5, cy+6); ctx.lineTo(cx+12, cy+10); ctx.stroke();
            
            ctx.fillStyle = color; ctx.shadowBlur = 10; ctx.shadowColor = color; 
            ctx.beginPath(); ctx.ellipse(cx, cy+2, 6, 8, 0, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
            ctx.fillStyle = "#2f3542"; ctx.beginPath(); ctx.arc(cx, cy-5, 4, 0, Math.PI*2); ctx.fill();
        }

        function drawSnakePart(part, index, color) {
            const isHead = index === 0; const cx = part.x + box/2, cy = part.y + box/2;
            ctx.shadowBlur = isHead ? 10 : 0; ctx.shadowColor = color;
            
            // Adjust body color slightly for texture
            ctx.globalAlpha = (index !== 0 && index % 2 === 0) ? 0.8 : 1.0;
            ctx.fillStyle = color; 
            ctx.beginPath(); ctx.arc(cx, cy, box/2.2, 0, Math.PI*2); ctx.fill(); 
            ctx.globalAlpha = 1.0; ctx.shadowBlur = 0;

            if(isHead) {
                ctx.fillStyle = "white"; let e1x, e1y, e2x, e2y, off=4;
                if(d==="RIGHT"){e1x=cx+off; e1y=cy-off; e2x=cx+off; e2y=cy+off;} else if(d==="LEFT"){e1x=cx-off; e1y=cy-off; e2x=cx-off; e2y=cy+off;}
                else if(d==="UP"){e1x=cx-off; e1y=cy-off; e2x=cx+off; e2y=cy-off;} else if(d==="DOWN"){e1x=cx-off; e1y=cy+off; e2x=cx+off; e2y=cy+off;}
                ctx.beginPath(); ctx.arc(e1x, e1y, 3, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(e2x, e2y, 3, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "black";
                ctx.beginPath(); ctx.arc(e1x+(d==="RIGHT"?1:d==="LEFT"?-1:0), e1y+(d==="DOWN"?1:d==="UP"?-1:0), 1.5, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(e2x+(d==="RIGHT"?1:d==="LEFT"?-1:0), e2y+(d==="DOWN"?1:d==="UP"?-1:0), 1.5, 0, Math.PI*2); ctx.fill();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawBug(food.x, food.y, foodColor);
            for (let i = 0; i < snake.length; i++) drawSnakePart(snake[i], i, snakeColor);

            let snakeX = snake[0].x, snakeY = snake[0].y;
            if (d == "LEFT") snakeX -= box; if (d == "UP") snakeY -= box;
            if (d == "RIGHT") snakeX += box; if (d == "DOWN") snakeY += box;

            if (snakeX == food.x && snakeY == food.y) {
                score++; document.getElementById("scoreBoard").innerText = "Score: " + score;
                snakeColor = foodColor; // Snake eats and changes color!
                foodColor = colors[Math.floor(Math.random() * colors.length)]; // New food color
                food = { x: Math.floor(Math.random()*19+1)*box, y: Math.floor(Math.random()*19+1)*box };
            } else snake.pop();

            let newHead = { x: snakeX, y: snakeY };
            if(snakeX<0 || snakeY<0 || snakeX>=canvas.width || snakeY>=canvas.height) { alert("Game Over! Score: "+score); location.reload(); return;}
            for(let i=0; i<snake.length; i++){ if(snakeX == snake[i].x && snakeY == snake[i].y) { alert("Game Over! Score: "+score); location.reload(); return;}}
            
            snake.unshift(newHead);
        }
        setInterval(draw, 120);
    </script>
</body>
</html>

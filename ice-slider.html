<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ice Slider Snake</title>
    <style>
        body { background: #dff9fb; color: #130f40; text-align: center; margin: 0; font-family: sans-serif; overflow: hidden; }
        header { background: #c7ecee; padding: 10px; border-bottom: 2px solid #7ed6df; }
        h2 { margin: 0; color: #22a6b3; }
        .score-board { display: flex; justify-content: center; gap: 20px; margin: 10px 0; font-size: 18px; font-weight: bold; color: #22a6b3; }
        .game-container { position: relative; display: flex; flex-direction: column; align-items: center; }
        canvas { background: #e0f7fa; border: 4px solid #b2bec3; border-radius: 10px; box-shadow: 0 0 20px rgba(126, 214, 223, 0.5); }
        
        .overlay { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 400px; max-width: 95vw; height: 400px; background: rgba(223, 249, 251, 0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 10px; z-index: 10; border: 2px solid #7ed6df;}
        .overlay h3 { font-size: 32px; color: #22a6b3; margin-bottom: 20px; }
        .action-btn { background: #7ed6df; color: #fff; border: none; padding: 12px 30px; font-size: 20px; font-weight: bold; border-radius: 25px; cursor: pointer; box-shadow: 0 4px 15px rgba(126, 214, 223, 0.5); }
        .action-btn:active { transform: scale(0.95); }

        .controls { display: grid; grid-template-columns: 60px 60px 60px; justify-content: center; gap: 5px; margin-top: 15px; }
        .ctrl-btn { background: #7ed6df; color: white; border: none; border-radius: 8px; font-size: 20px; padding: 12px; touch-action: manipulation; }
    </style>
</head>
<body>
    <header><h2>❄️ Ice Slider</h2></header>
    <div class="score-board">
        <div id="levelDisplay" style="color: #ff7979;">Level: 1</div>
        <div id="scoreDisplay">Score: 0</div>
    </div>
    
    <div class="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="startScreen" class="overlay">
            <h3>Ready to Slide?</h3>
            <button class="action-btn" onclick="startGame()">▶️ Play Now</button>
        </div>
        <div id="gameOverScreen" class="overlay" style="display: none;">
            <h3>Slipped Out! 🧊</h3>
            <p id="finalScoreText" style="font-size: 20px; margin-bottom: 20px;">Score: 0</p>
            <button class="action-btn" onclick="startGame()">🔄 Try Again</button>
        </div>
    </div>

    <div class="controls">
        <button id="btnLeft" class="ctrl-btn" style="grid-column: 1; grid-row: 2;">⬅️</button>
        <button id="btnUp" class="ctrl-btn" style="grid-column: 2; grid-row: 1;">⬆️</button>
        <button id="btnDown" class="ctrl-btn" style="grid-column: 2; grid-row: 2;">⬇️</button>
        <button id="btnRight" class="ctrl-btn" style="grid-column: 3; grid-row: 2;">➡️</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas"); const ctx = canvas.getContext("2d");
        
        const AudioContext = window.AudioContext || window.webkitAudioContext; let audioCtx;
        function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
        function playSound(type) {
            if (!audioCtx) return; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'eat') { osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(1600, audioCtx.currentTime + 0.1); gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); osc.start(); osc.stop(audioCtx.currentTime + 0.1); }
            else if (type === 'die') { osc.type = 'triangle'; osc.frequency.setValueAtTime(300, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.5); gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5); osc.start(); osc.stop(audioCtx.currentTime + 0.5); }
            else if (type === 'levelUp') { osc.type = 'sine'; osc.frequency.setValueAtTime(400, audioCtx.currentTime); osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.2); gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4); osc.start(); osc.stop(audioCtx.currentTime + 0.4); }
        }

        let box = 20, score = 0, level = 1, speed = 160, d = "RIGHT";
        let snake = []; let food = {}; let gameLoop; let isGameRunning = false;

        function randomPos() { return { x: Math.floor(Math.random()*19+1)*box, y: Math.floor(Math.random()*19+1)*box }; }

        document.addEventListener("keydown", e => {
            if(!isGameRunning) return;
            if(e.keyCode == 37 && d != "RIGHT") d = "LEFT"; else if(e.keyCode == 38 && d != "DOWN") d = "UP";
            else if(e.keyCode == 39 && d != "LEFT") d = "RIGHT"; else if(e.keyCode == 40 && d != "UP") d = "DOWN";
        });
        const bindBtn = (id, dir, opp) => { document.getElementById(id).addEventListener("touchstart", (e) => { e.preventDefault(); if(!isGameRunning) return; if(d != opp) d = dir; }); };
        bindBtn("btnUp", "UP", "DOWN"); bindBtn("btnDown", "DOWN", "UP"); bindBtn("btnLeft", "LEFT", "RIGHT"); bindBtn("btnRight", "RIGHT", "LEFT");

        function drawBug(x, y) {
            const cx = x + box/2, cy = y + box/2;
            ctx.fillStyle = "#ff7979"; ctx.beginPath(); ctx.ellipse(cx, cy+2, 6, 8, 0, 0, Math.PI*2); ctx.fill(); 
            ctx.fillStyle = "#2f3542"; ctx.beginPath(); ctx.arc(cx, cy-5, 4, 0, Math.PI*2); ctx.fill();
        }

        function drawSnakePart(part, index) {
            const isHead = index === 0; const cx = part.x + box/2, cy = part.y + box/2;
            ctx.shadowBlur = isHead ? 10 : 0; ctx.shadowColor = "#ffffff";
            ctx.fillStyle = isHead ? "#22a6b3" : "#7ed6df"; 
            ctx.beginPath(); ctx.arc(cx, cy, box/2.2, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
            if(isHead) {
                ctx.fillStyle = "white"; let e1x, e1y, e2x, e2y, off=4;
                if(d==="RIGHT"){e1x=cx+off; e1y=cy-off; e2x=cx+off; e2y=cy+off;} else if(d==="LEFT"){e1x=cx-off; e1y=cy-off; e2x=cx-off; e2y=cy+off;}
                else if(d==="UP"){e1x=cx-off; e1y=cy-off; e2x=cx+off; e2y=cy-off;} else if(d==="DOWN"){e1x=cx-off; e1y=cy+off; e2x=cx+off; e2y=cy+off;}
                ctx.beginPath(); ctx.arc(e1x, e1y, 3, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(e2x, e2y, 3, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "black";
                ctx.beginPath(); ctx.arc(e1x+(d==="RIGHT"?1:d==="LEFT"?-1:0), e1y+(d==="DOWN"?1:d==="UP"?-1:0), 1.5, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(e2x+(d==="RIGHT"?1:d==="LEFT"?-1:0), e2y+(d==="DOWN"?1:d==="UP"?-1:0), 1.5, 0, Math.PI*2); ctx.fill();
            }
        }

        function draw() {
            if(!isGameRunning) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(255,255,255,0.4)"; ctx.fillRect(40, 40, 60, 60); ctx.fillRect(200, 300, 80, 40); ctx.fillRect(300, 100, 50, 80);

            drawBug(food.x, food.y);
            for (let i = 0; i < snake.length; i++) drawSnakePart(snake[i], i);

            let snakeX = snake[0].x, snakeY = snake[0].y;
            if (d == "LEFT") snakeX -= box; if (d == "UP") snakeY -= box;
            if (d == "RIGHT") snakeX += box; if (d == "DOWN") snakeY += box;

            if (snakeX == food.x && snakeY == food.y) {
                score++; playSound('eat'); food = randomPos();
                
                // Ice Slider Level Logic
                if(score % 5 === 0) {
                    level++; playSound('levelUp');
                    if(speed > 50) speed -= 25; // Massive speed bump to simulate sliding
                    document.getElementById("levelDisplay").innerText = "Level: " + level;
                }
                document.getElementById("scoreDisplay").innerText = "Score: " + score;
            } else snake.pop();

            let newHead = { x: snakeX, y: snakeY };
            if(snakeX<0 || snakeY<0 || snakeX>=canvas.width || snakeY>=canvas.height) { endGame(); return; }
            for(let i=0; i<snake.length; i++){ if(snakeX == snake[i].x && snakeY == snake[i].y) { endGame(); return; }}
            
            snake.unshift(newHead);
            gameLoop = setTimeout(draw, speed);
        }

        function startGame() {
            initAudio(); document.getElementById("startScreen").style.display = "none"; document.getElementById("gameOverScreen").style.display = "none";
            snake = [{ x: 9 * box, y: 10 * box }]; score = 0; level = 1; speed = 160; d = "RIGHT"; isGameRunning = true; food = randomPos();
            document.getElementById("scoreDisplay").innerText = "Score: 0"; document.getElementById("levelDisplay").innerText = "Level: 1";
            clearTimeout(gameLoop); draw();
        }

        function endGame() {
            isGameRunning = false; clearTimeout(gameLoop); playSound('die');
            document.getElementById("finalScoreText").innerText = `Score: ${score}\nLevel: ${level}`;
            document.getElementById("gameOverScreen").style.display = "flex";
        }
    </script>
</body>
</html>

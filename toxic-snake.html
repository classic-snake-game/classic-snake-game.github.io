<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Toxic Snake</title>
    <style>
        body { background: #0a1900; color: #fff; text-align: center; margin: 0; font-family: sans-serif; overflow: hidden; }
        header { background: #1b4d00; padding: 10px; border-bottom: 2px solid #33cc00; }
        h2 { margin: 0; }
        .score-board { display: flex; justify-content: center; gap: 20px; margin: 10px 0; font-size: 18px; font-weight: bold; color: #33cc00; }
        .game-container { position: relative; display: flex; flex-direction: column; align-items: center; }
        canvas { background: #112e00; border: 4px solid #33cc00; border-radius: 5px; }
        
        .overlay { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 400px; max-width: 95vw; height: 400px; background: rgba(10, 25, 0, 0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 5px; z-index: 10; border: 2px solid #33cc00;}
        .overlay h3 { font-size: 32px; color: #ff3300; margin-bottom: 20px; }
        .action-btn { background: #33cc00; color: #000; border: none; padding: 12px 30px; font-size: 20px; font-weight: bold; border-radius: 25px; cursor: pointer; box-shadow: 0 4px 15px rgba(51, 204, 0, 0.4); }
        .action-btn:active { transform: scale(0.95); }

        .controls { display: grid; grid-template-columns: 60px 60px 60px; justify-content: center; gap: 5px; margin-top: 15px; }
        .ctrl-btn { background: #33cc00; color: black; border: none; border-radius: 10px; font-size: 24px; padding: 10px; font-weight: bold; touch-action: manipulation;}
    </style>
</head>
<body>
    <header><h2>☠️ Toxic Jungle</h2></header>
    <div class="score-board">
        <div id="levelDisplay" style="color: #ff9900;">Level: 1</div>
        <div id="scoreDisplay">Score: 0</div>
    </div>
    
    <div class="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <div id="startScreen" class="overlay">
            <h3>Survive the Jungle</h3>
            <button class="action-btn" onclick="startGame()">▶️ Play Now</button>
        </div>

        <div id="gameOverScreen" class="overlay" style="display: none;">
            <h3>Poisoned! ☠️</h3>
            <p id="finalScoreText" style="font-size: 20px; margin-bottom: 20px;">Score: 0</p>
            <button class="action-btn" onclick="startGame()">🔄 Play Again</button>
        </div>
    </div>

    <div class="controls">
        <button id="btnLeft" class="ctrl-btn" style="grid-column: 1; grid-row: 2;">⬅️</button>
        <button id="btnUp" class="ctrl-btn" style="grid-column: 2; grid-row: 1;">⬆️</button>
        <button id="btnDown" class="ctrl-btn" style="grid-column: 2; grid-row: 2;">⬇️</button>
        <button id="btnRight" class="ctrl-btn" style="grid-column: 3; grid-row: 2;">➡️</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas"); const ctx = canvas.getContext("2d");
        
        // --- AUDIO ---
        const AudioContext = window.AudioContext || window.webkitAudioContext; let audioCtx;
        function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
        function playSound(type) {
            if (!audioCtx) return; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'eat') { osc.type = 'sine'; osc.frequency.setValueAtTime(500, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.1); gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); osc.start(); osc.stop(audioCtx.currentTime + 0.1); }
            else if (type === 'die') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.6); gain.gain.setValueAtTime(0.4, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6); osc.start(); osc.stop(audioCtx.currentTime + 0.6); }
            else if (type === 'levelUp') { osc.type = 'square'; osc.frequency.setValueAtTime(300, audioCtx.currentTime); osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.15); gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3); osc.start(); osc.stop(audioCtx.currentTime + 0.3); }
        }

        let box = 20, score = 0, level = 1, speed = 200, d = "RIGHT";
        let snake = []; let food = {}; let poisons = []; let gameLoop; let isGameRunning = false;

        function randomPos() { return { x: Math.floor(Math.random()*19+1)*box, y: Math.floor(Math.random()*19+1)*box }; }

        document.addEventListener("keydown", e => {
            if(!isGameRunning) return;
            if(e.keyCode == 37 && d != "RIGHT") d = "LEFT"; else if(e.keyCode == 38 && d != "DOWN") d = "UP";
            else if(e.keyCode == 39 && d != "LEFT") d = "RIGHT"; else if(e.keyCode == 40 && d != "UP") d = "DOWN";
        });
        const bindBtn = (id, dir, opp) => { document.getElementById(id).addEventListener("touchstart", (e) => { e.preventDefault(); if(!isGameRunning) return; if(d != opp) d = dir; }); };
        bindBtn("btnUp", "UP", "DOWN"); bindBtn("btnDown", "DOWN", "UP"); bindBtn("btnLeft", "LEFT", "RIGHT"); bindBtn("btnRight", "RIGHT", "LEFT");

        function drawBug(x, y) {
            const cx = x + box/2, cy = y + box/2;
            ctx.fillStyle = "#33cc00"; ctx.beginPath(); ctx.ellipse(cx, cy+2, 6, 8, 0, 0, Math.PI*2); ctx.fill(); 
            ctx.fillStyle = "#2f3542"; ctx.beginPath(); ctx.arc(cx, cy-5, 4, 0, Math.PI*2); ctx.fill();
        }

        function drawSkull(x, y) {
            const cx = x + box/2, cy = y + box/2;
            ctx.fillStyle = "#8a2be2"; ctx.beginPath(); ctx.arc(cx, cy-2, 6, 0, Math.PI*2); ctx.fill(); ctx.fillRect(cx-4, cy+2, 8, 5); 
            ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(cx-2.5, cy-2, 2, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(cx+2.5, cy-2, 2, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle="#000"; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(cx-2, cy+2); ctx.lineTo(cx-2, cy+7); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx, cy+2); ctx.lineTo(cx, cy+7); ctx.stroke(); ctx.beginPath(); ctx.moveTo(cx+2, cy+2); ctx.lineTo(cx+2, cy+7); ctx.stroke();
        }

        function drawSnakePart(part, index) {
            const isHead = index === 0; const cx = part.x + box/2, cy = part.y + box/2;
            ctx.shadowBlur = isHead ? 10 : 0; ctx.shadowColor = "#ff9900";
            ctx.fillStyle = isHead ? "#ff9900" : (index % 2 === 0 ? "#ffcc00" : "#ffb300"); 
            ctx.beginPath(); ctx.arc(cx, cy, box/2.2, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
            if(isHead) {
                ctx.fillStyle = "white"; let e1x, e1y, e2x, e2y, off=4;
                if(d==="RIGHT"){e1x=cx+off; e1y=cy-off; e2x=cx+off; e2y=cy+off;} else if(d==="LEFT"){e1x=cx-off; e1y=cy-off; e2x=cx-off; e2y=cy+off;}
                else if(d==="UP"){e1x=cx-off; e1y=cy-off; e2x=cx+off; e2y=cy-off;} else if(d==="DOWN"){e1x=cx-off; e1y=cy+off; e2x=cx+off; e2y=cy+off;}
                ctx.beginPath(); ctx.arc(e1x, e1y, 3, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(e2x, e2y, 3, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "black";
                ctx.beginPath(); ctx.arc(e1x+(d==="RIGHT"?1:d==="LEFT"?-1:0), e1y+(d==="DOWN"?1:d==="UP"?-1:0), 1.5, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(e2x+(d==="RIGHT"?1:d==="LEFT"?-1:0), e2y+(d==="DOWN"?1:d==="UP"?-1:0), 1.5, 0, Math.PI*2); ctx.fill();
            }
        }

        function draw() {
            if(!isGameRunning) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBug(food.x, food.y); 
            for(let p of poisons) drawSkull(p.x, p.y);
            for (let i = 0; i < snake.length; i++) drawSnakePart(snake[i], i);

            let snakeX = snake[0].x, snakeY = snake[0].y;
            if (d == "LEFT") snakeX -= box; if (d == "UP") snakeY -= box;
            if (d == "RIGHT") snakeX += box; if (d == "DOWN") snakeY += box;

            if (snakeX == food.x && snakeY == food.y) {
                score++; playSound('eat'); food = randomPos();
                
                // Toxic Level Up Logic: Add more poison skulls!
                if(score % 5 === 0) {
                    level++; playSound('levelUp');
                    if(speed > 80) speed -= 10;
                    poisons.push(randomPos()); // ADD NEW SKULL
                    document.getElementById("levelDisplay").innerText = "Level: " + level;
                } else {
                    // Just move existing skulls
                    for(let i=0; i<poisons.length; i++) poisons[i] = randomPos();
                }
                document.getElementById("scoreDisplay").innerText = "Score: " + score;
            } else snake.pop();

            let newHead = { x: snakeX, y: snakeY };
            
            for(let p of poisons) { if (snakeX == p.x && snakeY == p.y) { endGame(); return; } } // Hit Poison
            if(snakeX<0 || snakeY<0 || snakeX>=canvas.width || snakeY>=canvas.height) { endGame(); return; } // Hit Wall
            for(let i=0; i<snake.length; i++){ if(snakeX == snake[i].x && snakeY == snake[i].y) { endGame(); return; }} // Hit Self
            
            snake.unshift(newHead);
            gameLoop = setTimeout(draw, speed);
        }

        function startGame() {
            initAudio(); document.getElementById("startScreen").style.display = "none"; document.getElementById("gameOverScreen").style.display = "none";
            snake = [{ x: 9 * box, y: 10 * box }]; score = 0; level = 1; speed = 180; d = "RIGHT"; isGameRunning = true; 
            food = randomPos(); poisons = [randomPos()]; // Start with 1 poison
            document.getElementById("scoreDisplay").innerText = "Score: " + score; document.getElementById("levelDisplay").innerText = "Level: " + level;
            clearTimeout(gameLoop); draw();
        }

        function endGame() {
            isGameRunning = false; clearTimeout(gameLoop); playSound('die');
            document.getElementById("finalScoreText").innerText = "Final Score: " + score + "\nPoison Count: " + poisons.length;
            document.getElementById("gameOverScreen").style.display = "flex";
        }
    </script>
</body>
</html>

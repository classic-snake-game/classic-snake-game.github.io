<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Toxic Snake</title>
    <style>
        body { background: #0a1900; color: #fff; text-align: center; margin: 0; font-family: sans-serif; overflow: hidden; }
        header { background: #1b4d00; padding: 10px; border-bottom: 2px solid #33cc00; }
        canvas { background: #112e00; border: 4px solid #33cc00; margin-top: 10px; }
        .controls { display: grid; grid-template-columns: 60px 60px 60px; justify-content: center; gap: 5px; margin-top: 10px; }
        button { background: #33cc00; color: black; border: none; border-radius: 10px; font-size: 24px; padding: 10px; touch-action: manipulation; font-weight: bold;}
        #scoreBoard { font-size: 20px; color: #fff; margin: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <header><h2>☠️ Toxic Jungle</h2><div id="scoreBoard">Score: 0</div></header>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="controls">
        <button id="btnLeft" style="grid-column: 1; grid-row: 2;">L</button>
        <button id="btnUp" style="grid-column: 2; grid-row: 1;">U</button>
        <button id="btnDown" style="grid-column: 2; grid-row: 2;">D</button>
        <button id="btnRight" style="grid-column: 3; grid-row: 2;">R</button>
    </div>
    <script>
        const canvas = document.getElementById("gameCanvas"); const ctx = canvas.getContext("2d");
        let box = 20, score = 0, d = "RIGHT";
        let snake = [{ x: 9 * box, y: 10 * box }];
        let food = { x: 5*box, y: 5*box };
        let poison = { x: 15*box, y: 15*box };

        document.addEventListener("keydown", e => {
            if(e.keyCode == 37 && d != "RIGHT") d = "LEFT"; else if(e.keyCode == 38 && d != "DOWN") d = "UP";
            else if(e.keyCode == 39 && d != "LEFT") d = "RIGHT"; else if(e.keyCode == 40 && d != "UP") d = "DOWN";
        });
        const bindBtn = (id, dir, opp) => {
            document.getElementById(id).addEventListener("touchstart", (e) => { e.preventDefault(); if(d != opp) d = dir; });
        };
        bindBtn("btnUp", "UP", "DOWN"); bindBtn("btnDown", "DOWN", "UP"); bindBtn("btnLeft", "LEFT", "RIGHT"); bindBtn("btnRight", "RIGHT", "LEFT");

        function randomPos() { return { x: Math.floor(Math.random()*19+1)*box, y: Math.floor(Math.random()*19+1)*box }; }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw Food (Green)
            ctx.fillStyle = "#00ff00"; ctx.fillRect(food.x, food.y, box, box);
            // Draw Poison (Purple)
            ctx.fillStyle = "#8a2be2"; ctx.fillRect(poison.x, poison.y, box, box);

            for (let i = 0; i < snake.length; i++) {
                ctx.fillStyle = i == 0 ? "#ff9900" : "#ffcc00";
                ctx.fillRect(snake[i].x, snake[i].y, box-1, box-1);
            }

            let snakeX = snake[0].x, snakeY = snake[0].y;
            if (d == "LEFT") snakeX -= box; if (d == "UP") snakeY -= box;
            if (d == "RIGHT") snakeX += box; if (d == "DOWN") snakeY += box;

            // Eat Food
            if (snakeX == food.x && snakeY == food.y) {
                score++; document.getElementById("scoreBoard").innerText = "Score: " + score;
                food = randomPos();
                poison = randomPos(); // Poison changes location when food is eaten
            } else { snake.pop(); }

            // Eat Poison = Die
            if (snakeX == poison.x && snakeY == poison.y) {
                alert("You ate poison! Game Over! Score: "+score); location.reload(); return;
            }

            let newHead = { x: snakeX, y: snakeY };
            if(snakeX<0 || snakeY<0 || snakeX>=canvas.width || snakeY>=canvas.height) { alert("Game Over!"); location.reload(); return;}
            for(let i=0; i<snake.length; i++){ if(snakeX == snake[i].x && snakeY == snake[i].y) { alert("Game Over!"); location.reload(); return;}}
            
            snake.unshift(newHead);
        }
        setInterval(draw, 140);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ghost Mode Snake</title>
    <style>
        body { background: #050510; color: #fff; text-align: center; margin: 0; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        header { background: #1a1a3a; padding: 10px; border-bottom: 2px solid #5a5af0; box-shadow: 0 0 15px #5a5af0; }
        h2 { margin: 0; color: #8a8aff; text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 0 10px #5a5af0; }
        .score-board { display: flex; justify-content: center; gap: 20px; margin: 10px 0; font-size: 18px; font-weight: bold; color: #8a8aff; }
        .game-container { position: relative; display: flex; flex-direction: column; align-items: center; }
        canvas { background: #000; border: 2px dashed #3a3a8a; border-radius: 5px; box-shadow: 0 0 20px rgba(90, 90, 240, 0.3); }
        
        .overlay { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 400px; max-width: 95vw; height: 400px; background: rgba(5, 5, 16, 0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 5px; z-index: 10; border: 2px solid #5a5af0;}
        .overlay h3 { font-size: 32px; color: #8a8aff; margin-bottom: 20px; text-shadow: 0 0 15px #8a8aff; }
        .action-btn { background: #1a1a3a; color: #8a8aff; border: 2px solid #5a5af0; padding: 12px 30px; font-size: 20px; font-weight: bold; border-radius: 5px; cursor: pointer; box-shadow: 0 4px 15px rgba(90, 90, 240, 0.4); font-family: 'Courier New'; }
        .action-btn:active { transform: scale(0.95); background: #5a5af0; color: #fff;}

        .controls { display: grid; grid-template-columns: 60px 60px 60px; justify-content: center; gap: 8px; margin-top: 15px; }
        .ctrl-btn { background: #1a1a3a; color: #8a8aff; border: 1px solid #5a5af0; border-radius: 5px; font-size: 24px; padding: 10px; touch-action: manipulation; }
    </style>
</head>
<body>
    <header><h2>👻 Ghost Mode</h2></header>
    <div class="score-board">
        <div id="levelDisplay" style="color: #fff;">Level: 1</div>
        <div id="scoreDisplay">Score: 0</div>
    </div>
    
    <div class="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <div id="startScreen" class="overlay">
            <h3>Spooky Snake...</h3>
            <button class="action-btn" onclick="startGame()">▶️ Haunt Now</button>
        </div>

        <div id="gameOverScreen" class="overlay" style="display: none;">
            <h3>Busted! 👻</h3>
            <p id="finalScoreText" style="font-size: 20px; margin-bottom: 20px;">Score: 0</p>
            <button class="action-btn" onclick="startGame()">🔄 Haunt Again</button>
        </div>
    </div>

    <div class="controls">
        <button id="btnLeft" class="ctrl-btn" style="grid-column: 1; grid-row: 2;">⬅️</button>
        <button id="btnUp" class="ctrl-btn" style="grid-column: 2; grid-row: 1;">⬆️</button>
        <button id="btnDown" class="ctrl-btn" style="grid-column: 2; grid-row: 2;">⬇️</button>
        <button id="btnRight" class="ctrl-btn" style="grid-column: 3; grid-row: 2;">➡️</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas"); const ctx = canvas.getContext("2d");
        
        // --- AUDIO ---
        const AudioContext = window.AudioContext || window.webkitAudioContext; let audioCtx;
        function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
        function playSound(type) {
            if (!audioCtx) return; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'eat') { osc.type = 'sine'; osc.frequency.setValueAtTime(300, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.15); gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15); osc.start(); osc.stop(audioCtx.currentTime + 0.15); }
            else if (type === 'die') { osc.type = 'sine'; osc.frequency.setValueAtTime(100, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.8); gain.gain.setValueAtTime(0.4, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8); osc.start(); osc.stop(audioCtx.currentTime + 0.8); }
            else if (type === 'levelUp') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.3); gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3); osc.start(); osc.stop(audioCtx.currentTime + 0.3); }
        }

        let box = 20, score = 0, level = 1, speed = 160, d = "RIGHT";
        let snake = []; let food = {}; let gameLoop; let isGameRunning = false;

        function randomPos() { return { x: Math.floor(Math.random()*19+1)*box, y: Math.floor(Math.random()*19+1)*box }; }

        document.addEventListener("keydown", e => {
            if(!isGameRunning) return;
            if(e.keyCode == 37 && d != "RIGHT") d = "LEFT"; else if(e.keyCode == 38 && d != "DOWN") d = "UP";
            else if(e.keyCode == 39 && d != "LEFT") d = "RIGHT"; else if(e.keyCode == 40 && d != "UP") d = "DOWN";
        });
        const bindBtn = (id, dir, opp) => { document.getElementById(id).addEventListener("touchstart", (e) => { e.preventDefault(); if(!isGameRunning) return; if(d != opp) d = dir; }); };
        bindBtn("btnUp", "UP", "DOWN"); bindBtn("btnDown", "DOWN", "UP"); bindBtn("btnLeft", "LEFT", "RIGHT"); bindBtn("btnRight", "RIGHT", "LEFT");

        function drawBug(x, y) {
            const cx = x + box/2, cy = y + box/2;
            ctx.shadowBlur = 15; ctx.shadowColor = "#8a8aff";
            ctx.fillStyle = "#8a8aff"; ctx.beginPath(); ctx.ellipse(cx, cy+2, 6, 8, 0, 0, Math.PI*2); ctx.fill(); 
            ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(cx, cy-4, 4, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
        }

        function drawSnakePart(part, index) {
            const isHead = index === 0; const cx = part.x + box/2, cy = part.y + box/2;
            
            // Ghost Fade Logic based on Level
            // Level 1: visible, Level 5: tail fades very fast
            let decayRate = level * 0.08; 
            let alpha = Math.max(0.05, 1 - (index * decayRate)); 
            ctx.globalAlpha = alpha;
            
            ctx.shadowBlur = isHead ? 15 : 0; ctx.shadowColor = "#fff";
            ctx.fillStyle = isHead ? "#ffffff" : "#bdc3c7"; 
            ctx.beginPath(); ctx.arc(cx, cy, box/2.2, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;

            if(isHead) {
                ctx.fillStyle = "#8a8aff"; let e1x, e1y, e2x, e2y, off=4;
                if(d==="RIGHT"){e1x=cx+off; e1y=cy-off; e2x=cx+off; e2y=cy+off;} else if(d==="LEFT"){e1x=cx-off; e1y=cy-off; e2x=cx-off; e2y=cy+off;}
                else if(d==="UP"){e1x=cx-off; e1y=cy-off; e2x=cx+off; e2y=cy-off;} else if(d==="DOWN"){e1x=cx-off; e1y=cy+off; e2x=cx+off; e2y=cy+off;}
                ctx.beginPath(); ctx.arc(e1x, e1y, 3, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(e2x, e2y, 3, 0, Math.PI*2); ctx.fill();
            }
            ctx.globalAlpha = 1.0; 
        }

        function draw() {
            if(!isGameRunning) return;
            ctx.fillStyle = "rgba(0, 0, 0, 0.2)"; ctx.fillRect(0, 0, canvas.width, canvas.height); 
            drawBug(food.x, food.y);
            for (let i = 0; i < snake.length; i++) drawSnakePart(snake[i], i);

            let snakeX = snake[0].x, snakeY = snake[0].y;
            if (d == "LEFT") snakeX -= box; if (d == "UP") snakeY -= box;
            if (d == "RIGHT") snakeX += box; if (d == "DOWN") snakeY += box;

            if (snakeX == food.x && snakeY == food.y) {
                score++; playSound('eat'); food = randomPos();
                
                // Ghost Level Logic: Faster fading tail
                if(score % 5 === 0) {
                    level++; playSound('levelUp');
                    if(speed > 70) speed -= 10;
                    document.getElementById("levelDisplay").innerText = "Level: " + level;
                }
                document.getElementById("scoreDisplay").innerText = "Score: " + score;
            } else snake.pop();

            let newHead = { x: snakeX, y: snakeY };
            if(snakeX<0 || snakeY<0 || snakeX>=canvas.width || snakeY>=canvas.height) { endGame(); return; }
            for(let i=0; i<snake.length; i++){ if(snakeX == snake[i].x && snakeY == snake[i].y) { endGame(); return; }}
            
            snake.unshift(newHead);
            gameLoop = setTimeout(draw, speed);
        }

        function startGame() {
            initAudio(); document.getElementById("startScreen").style.display = "none"; document.getElementById("gameOverScreen").style.display = "none";
            snake = [{ x: 9 * box, y: 10 * box }]; score = 0; level = 1; speed = 160; d = "RIGHT"; isGameRunning = true; food = randomPos();
            document.getElementById("scoreDisplay").innerText = "Score: " + score; document.getElementById("levelDisplay").innerText = "Level: " + level;
            clearTimeout(gameLoop); draw();
        }

        function endGame() {
            isGameRunning = false; clearTimeout(gameLoop); playSound('die');
            document.getElementById("finalScoreText").innerText = "Final Score: " + score + "\nLevel Reached: " + level;
            document.getElementById("gameOverScreen").style.display = "flex";
        }
    </script>
</body>
</html>
